# Single-container demo API (H2 in-memory). Use: SPRING_PROFILES_ACTIVE=demo
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:swms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# application.properties sets MySQL dialect; override for H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

jwt.secret=${JWT_SECRET:swms_super_secret_key_must_be_at_least_256_bits_long_for_hs256_algorithm}
jwt.expiration=86400000

# Browser hits Vercel same-origin; Edge proxy calls this server (no CORS). Patterns cover all Vercel previews.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:3000,http://localhost:5173}
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:3000,http://localhost:5173}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.swms=INFO
