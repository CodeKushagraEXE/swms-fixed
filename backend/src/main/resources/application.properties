server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/swms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=swms_super_secret_key_must_be_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration=86400000

# WebSocket
websocket.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.swms=INFO
logging.level.org.springframework.security=WARN

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Optional Mail (for notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
